<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Puissance 4 | Aller Jouer</title>
        <link rel="stylesheet" href="../../interface/style.css" />
        <link rel="stylesheet" href="games.css" />
        <link rel="icon" href="../../interface/assets/favicon.ico" />
    </head>
    <script>
        const displayer = document.getElementById('displayer');
        const actions = document.getElementById('actions');
        const authorized = 'abcdefgh12345678nqrb';
        const typed = [];

        function isChessSquare(...chars) {
            const letters = authorized.slice(0, 8);
            if(letters.includes(chars[0]) && Number.isInteger(Number(chars[1])) && chars[1] >= 1 && chars[1] <= 8) return true;
            return false;
        }

        function isPromotion(char) {
            return 'nqrb'.includes(char);
        }

        window.addEventListener('keydown', e => {
            const finalKey = e.key.toLowerCase();
            if(finalKey === 'm') {
                typed.splice(0, typed.length);
                displayer.textContent = '';
                return;
            }
            if(!authorized.includes(finalKey)) return;
            displayer.textContent += finalKey;

            const twoLast = [typed[typed.length - 1], finalKey];
            const isSquare = isChessSquare(...twoLast);
            typed.push(finalKey);

            if(isSquare) actions.textContent += twoLast.join('') + ' ';
            if(isPromotion(finalKey)) actions.textContent += finalKey + ' ';
        });
    </script>
    <body>
        <div id="head-tracker"></div>
        <div id="face-detection-popup" class="popup">
            <div class="popup-body">
                <h3 id="face-detection-title">
                    Détection du visage
                </h3>
                <div class="inline-options">
                    <button id="activate-face-detection" class="popup-option" onclick="activateFacialDetection();">✅
                        Activer</button>
                    <button id="deactivate-face-detection" class="popup-option" onclick="deactivateFacialDetection();">❌
                        Désactiver</button>
                </div>
                <p>Sensibilité : <span id="sensibility-value">XX</span> %</p>
                <input type="range" min="0" max="100" id="sensibility-range" value="17" />
                <p>Durée d'un clin d'œil : <span id="blink-value">XX</span> s</p>
                <input type="range" min="0" max="1" id="blink-range" value=".25" step="0.1" />
                <div class="inline-options">
                    <button onclick="toDefaultParameters();" class="popup-option">Retour au paramètre par défaut</button>
                    <button onclick="closeDetectionPopup();" class="popup-option">Fermer</button>
                </div>
            </div>
            <div class="popupBackground"></div>
        </div>
        <div id="wrong-id-popup" class="popup">
            <div class="popup-body">
                <h3>
                    Nom incorrect !
                </h3>
                <p>
                    Le nom est déjà réservé ou invalide !
                </p>
                <div class="inline-options">
                    <button class="popup-option" onclick="closePopups();">Fermer</button>
                </div>
            </div>
            <div class="popupBackground"></div>
        </div>
        <div id="wait-popup" class="popup">
            <div class="popup-body">
                <h3>
                    Attendez un peu !
                </h3>
                <p>
                    Nous sommes en train de créer votre partie, vous allez être redirigé.
                </p>
                <div class="inline-options">
                    <button class="popup-option" onclick="closePopups();">Fermer</button>
                </div>
            </div>
            <div class="popupBackground"></div>
        </div>
        <div id="content">
            <div id="header">
                <a href="/" id="return" aria-label="Retourner au menu">
                    <img src="../../interface/assets/return.svg" alt="return" />
                </a>
                <a href="/">
                    <img id="logo" src="../../interface/assets/parachess_logo.svg" alt="Logo Parachess" />
                </a>
                <button id="toggle-facial-button" class="facial-active" aria-label="Activer/Désactiver le suivi du visage" onclick="displayFacialDetectionPopup(event);">
                    <img id="toggle-face-button-image" src="../../interface/assets/eye-open.svg" alt="🔴" />
                </button>
            </div>
            <img class="background" src="../../interface/assets/background.svg" alt="" />
            <div id="separate">
                                <div class="panel" id="right">
                    <h2>
                        <div class="logo-button">🔴</div>
                        Créer une nouvelle partie
                    </h2>
                    <div id="form">
                        <button id="auto-create" aria-label="Créer automatiquement la partie" class="modern-button" onclick="createGameAutomatically();">
                            Créer automatiquement !
                        </button>
                        <div class="divider"></div>
                        <label for="id">
                            Nom de la partie :
                        </label>
                        <input id="id" name="id" type="text" selected placeholder="Nom de la partie" />
                        <br />
                        <br />
                        <button id="create" aria-label="Créer la partie" class="modern-button" onclick="createGame();" select>Créer</button>
                    </div>
                </div>
                <div class="panel" id="left">
                    <h2>
                        <div class="logo-button">🔵</div>
                        Rejoindre une partie existante
                    </h2>
                    <br />
                    <ul id="game-list">
            
                    </ul>
                </div>

            </div>
        </div>
        <video id="webcam" autoplay playsinline></video>
        <script src="games-connect.js" type="module"></script>
        <script src="../../interface/head-tracking.js" type="module"></script>
    </body>
</html>
