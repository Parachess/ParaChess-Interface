<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="utf-8" />
    <title>
        Parachess
    </title>
    <link rel="stylesheet" href="/public/style.css" />
    <link rel="stylesheet" href="/public/index.css" />
    <link rel="icon" href="/public/assets/favicon.ico" />
</head>
<script>
    const keyPressed = {};
    let i = 0
    window.addEventListener('keydown', e => {
            keyPressed[e.key] = true;

            if (keyPressed['Control'] && keyPressed['Alt']) {
                if (e.key === 'c') {
                    if (i === 0){
                        i = 1;
                        activateFacialDetection();
                    }
                    else{
                        i = 0;
                        deactivateFacialDetection();
                    }
                }
                else if (e.key === 'q') {
                    window.open('/rules/', '_self'); // Aller dans l'onglet Règles du jeu
                } 
                else if (e.key === 'z') {
                    window.open('/about-us/', '_self'); // Aller dans l'onglet Qui sommes-nous ?
                } 
                else if (e.key === 's') {
                    window.open('/credits/', '_self'); // Aller dans l'onglet Crédits
                } 
                else if (e.key === 'a') {
                        createGameAutomatically(); // Créer une partie automatiquement
                }
            }
        });

        window.addEventListener('keyup', e => {
            delete keyPressed[e.key];
        });
</script>
<body>
    <div id="head-tracker"></div>
    <div id="face-detection-popup" class="popup">
        <div class="popup-body">
            <h3 id="face-detection-title">
                Détection du visage
            </h3>
            <div class="inline-options">
                <button id="activate-face-detection" class="popup-option" onclick="activateFacialDetection();">✅ Activer</button>
                <button id="deactivate-face-detection" class="popup-option" onclick="deactivateFacialDetection();">❌ Désactiver</button>
            </div>
            <p>Sensibilité : <span id="sensibility-value">XX</span> %</p>
            <input type="range" min="0" max="100" id="sensibility-range" value="17" />
            <p>Durée d'un clin d'œil : <span id="blink-value">XX</span> s</p>
            <input type="range" min="0" max="1" id="blink-range" value=".25" step="0.1" />
                <div class="inline-options">
                    <button onclick="toDefaultParameters();" class="popup-option">Retour au paramètre par défaut</button>
                    <button onclick="closeDetectionPopup();" class="popup-option">Fermer</button>
                </div>
        </div>
        <div class="popupBackground"></div>
    </div>
    <div id="content">
        <div id="header">
            <a href="/" id="return" aria-label="Retourner au portail">
                <img src="/public/assets/return.svg" alt="return" />
            </a>
            <a href="/">
                <img id="logo" src="/public/assets/parachess_logo.svg" alt="Logo Parachess" />
            </a>
            <button id="toggle-facial-button" class="facial-active" aria-label="Paramètres du suivi du visage"
                onclick="displayFacialDetectionPopup();">
                <img id="toggle-face-button-image" src="/public/assets/eye-open.svg" alt="🔴" />
            </button>
        </div>
        <img class="background" src="/public/assets/background.svg" alt="" />
        <div id="chess">
            <div class="line">
                <div class="card card-light">
                    <a href="/games/">
                        <p class="card-title">
                            Aller jouer !
                        </p>
                        <p class="piece" aria-hidden="true">
                            ♖
                        </p>
                    </a>
                </div>
                <div class="card card-dark">
                    <a href="/about-us/">
                        <p class="card-title">
                            Qui sommes nous ?
                        </p>
                        <p class="piece" aria-hidden="true">
                            ♗
                        </p>
                    </a>
                </div>
            </div>
            <div class="line">
                <div class="card card-dark">
                    <a href="/rules/">
                        <p class="card-title">
                            Règles du jeu
                        </p>
                        <p class="piece" aria-hidden="true">
                            ♔
                        </p>
                    </a>
                </div>
                <div class="card card-light">
                    <a href="/credits/">
                        <p class="card-title">
                            Crédits
                        </p>
                        <p class="piece" aria-hidden="true">
                            ♙
                        </p>
                    </a>
                </div>
            </div>
        </div>
    </div>
    <video id="webcam" autoplay playsinline></video>
    <script src="/public/head-tracking.js" type="module"></script>
</body>

</html>
